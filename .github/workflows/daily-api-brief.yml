name: Daily API SignalDaily Brief

on:
  schedule:
    # 00:45 UTC = 06:15 Asia/Colombo.
    - cron: "45 0 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date in YYYY-MM-DD format. Defaults to Asia/Colombo today."
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: signaldaily-daily-api-brief
  cancel-in-progress: false

jobs:
  generate:
    name: Generate and commit daily brief
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve report date
        id: date
        env:
          INPUT_REPORT_DATE: ${{ inputs.report_date }}
        run: |
          if [ -n "$INPUT_REPORT_DATE" ]; then
            REPORT_DATE="$INPUT_REPORT_DATE"
          else
            REPORT_DATE=$(TZ=Asia/Colombo date +%F)
          fi
          echo "report_date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "Report date: $REPORT_DATE"

      - name: Generate API-backed brief
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/generate_daily.py \
            --date "${{ steps.date.outputs.report_date }}" \
            --output "daily/${{ steps.date.outputs.report_date }}.md" \
            --source-pack "source-packs/${{ steps.date.outputs.report_date }}.json"

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Commit daily files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "daily/${{ steps.date.outputs.report_date }}.md" "source-packs/${{ steps.date.outputs.report_date }}.json"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No daily changes to commit."
          else
            git commit -m "daily: add SignalDaily brief for ${{ steps.date.outputs.report_date }}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create run issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = '${{ steps.date.outputs.report_date }}' || new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SignalDaily API run failed: ${date}`,
              body: [
                `The API-powered SignalDaily workflow failed for ${date}.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `Check API failures, rate limits, source schema changes, or validator errors.`
              ].join('\n'),
              labels: ['daily-brief', 'automation-failure']
            });

      - name: Optional Telegram completion alert
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE: ${{ steps.date.outputs.report_date }}
          JOB_STATUS: ${{ job.status }}
          CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping Telegram alert."
            exit 0
          fi

          TEXT="SignalDaily API run: ${REPORT_DATE}%0AStatus: ${JOB_STATUS}%0ACommitted: ${CHANGED}%0AReport: daily/${REPORT_DATE}.md%0AEducational only; not financial advice."
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "disable_web_page_preview=true"
